<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - Usinagem Dia</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="style.css" />

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }
    });
  </script>
</head>

<body>

<header class="app-header">
  <h1 class="app-title">⚙️ Diário de Produção — Usinagem</h1>
  <div class="header-actions">
    <button id="exportAll" class="btn-export">Exportar CSV</button>
    <button id="resetAll" class="btn-reset">Resetar</button>
  </div>
  <div class="search-wrapper">
    <span class="search-icon"></span>
    <input
      id="searchInput"
      type="search"
      placeholder="Pesquisar máquina, operador ou peça…"
      class="search-input"
    />
    <span id="searchCount" class="search-count hidden"></span>
  </div>
</header>

<main class="app-main">
  <div id="machinesContainer" class="machines-grid"></div>
</main>

<footer class="app-footer">
  Dashboard de acompanhamento diário de produção
</footer>

<template id="machine-template">
  <div class="machine-card card-status-producao">

    <div class="card-header">
      <div class="card-header-info">
        <div class="card-title" data-role="title">Máquina</div>
        <div class="card-subtitle" data-role="subtitle">Operador: - · Ciclo: - · Peça: -</div>
        <span data-role="statusBadge" class="status-badge status-badge-producao">🟢 Produção</span>
      </div>
      <div class="card-predicted-wrapper">
        <div class="card-predicted-label">Previsto</div>
        <div class="card-predicted-value" data-role="predicted">0</div>
      </div>
    </div>

    <div class="card-controls">
      <button data-role="btnProducao" class="status-time-chip chip-producao active-chip">🟢 Produção</button>
      <button data-role="btnSetup" class="status-time-chip chip-setup">🟡 Setup: <span data-role="timeSetup">0:00</span></button>
      <button data-role="btnManutencao" class="status-time-chip chip-manutencao">🔴 Manut: <span data-role="timeManutencao">0:00</span></button>
      <div class="card-ctrl-buttons">
        <button data-role="btnPausar" class="btn-ctrl btn-pausar">⏸ Pausar</button>
        <button data-role="btnZerar" class="btn-ctrl btn-zerar">↺ Zerar</button>
      </div>
    </div>

    <div class="card-divider"></div>

    <div class="card-fields">

      <div class="field-full">
        <label class="field-label">Operador</label>
        <input data-role="operator" placeholder="Nome do operador" class="field-input" />
      </div>

      <div class="field-full">
        <label class="field-label">Processo / Peça</label>
        <input data-role="process" placeholder="Ex: Flange 300" class="field-input" />
      </div>

      <div class="field-half">
        <label class="field-label">Tempo de ciclo</label>
        <input data-role="cycle" placeholder="mm:ss" class="field-input" />
      </div>

      <div class="field-half">
        <label class="field-label">Tempo de troca</label>
        <input data-role="troca" placeholder="mm:ss" class="field-input" />
      </div>

      <div class="field-half">
        <label class="field-label">Início</label>
        <input data-role="startTime" type="time" class="field-input" />
      </div>

      <div class="field-half">
        <label class="field-label">Fim</label>
        <input data-role="endTime" type="time" class="field-input" />
      </div>

      <div class="field-half">
        <label class="field-label">Parada auto</label>
        <div class="field-input field-parada-auto">
          <span data-role="paradaAutoDisplay" class="parada-auto-value">0:00</span>
          <span class="parada-auto-hint">(Setup+Manut)</span>
        </div>
      </div>

      <div class="field-half">
        <label class="field-label">Peças realizadas</label>
        <input data-role="produced" placeholder="0" type="number" min="0" class="field-input" />
      </div>

      <div class="field-full">
        <label class="field-label">Observação</label>
        <input data-role="observacao" placeholder="Ex: quebra de ferramenta" class="field-input" />
      </div>

      <div class="field-full card-action-buttons">
        <button data-role="save" class="btn-action btn-save">Salvar</button>
        <button data-role="addHistory" class="btn-action btn-history">Histórico</button>
        <button data-role="clearHistory" class="btn-action btn-clear-history">Limpar</button>
      </div>

    </div>

    <div class="card-chart-wrapper">
      <canvas data-role="chart" height="100"></canvas>
      <div data-role="performance" class="card-performance"></div>
    </div>

    <div class="card-history" data-role="history"></div>

    <div class="card-future">
      <h3 class="future-title">Próximos processos</h3>
      <div class="future-input-row">
        <input data-role="futureInput" placeholder="Nome do processo" class="field-input future-name-input" />
        <select data-role="prioritySelect" class="field-input future-priority-select">
          <option value="vermelho">🔴 Urgente</option>
          <option value="amarelo">🟡 Alta</option>
          <option value="verde">🟢 Normal</option>
        </select>
      </div>
      <div class="future-action-row">
        <button data-role="addFuture" class="btn-action btn-add-future">＋ Adicionar</button>
        <button data-role="sortFuture" class="btn-action btn-sort-future">↕ Ordenar</button>
      </div>
      <div data-role="futureList" class="future-list"></div>
    </div>

  </div>
</template>

<script src="script.js"></script>
</body>
</html>
