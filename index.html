<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - Usinagem Dia</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <link rel="stylesheet" href="style.css" />

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }
    });
  </script>
</head>

<body class="bg-gray-900 text-gray-100">

<!-- HEADER -->
<header class="px-4 py-3 border-b border-gray-800 flex flex-wrap items-center justify-between gap-2">
  <h1 class="text-base font-bold tracking-wide">⚙️ Diário de Produção — Usinagem</h1>
  <div class="flex gap-2">
    <button id="exportAll" class="px-3 py-2 bg-sky-600 rounded text-sm font-semibold"> Exportar CSV</button>
    <button id="resetAll"  class="px-3 py-2 bg-red-600  rounded text-sm font-semibold"> Resetar</button>
  </div>
  <!-- BARRA DE PESQUISA -->
  <div class="w-full mt-2 relative">
    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></span>
    <input id="searchInput"
      type="search"
      placeholder="Pesquisar máquina, operador ou peça…"
      class="w-full pl-9 pr-4 py-2 rounded-lg bg-gray-700 border border-gray-600 text-sm text-gray-100 placeholder-gray-500"
    />
    <span id="searchCount" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hidden"></span>
  </div>
</header>

<!-- GRID DE MÁQUINAS -->
<main class="p-3">
  <div id="machinesContainer" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-3"></div>
</main>

<footer class="px-4 py-3 text-xs text-gray-500 border-t border-gray-800 text-center">
  Dashboard de acompanhamento diário de produção
</footer>

<!-- Card template -->
<template id="machine-template">
  <div class="card-status-producao bg-gray-800 rounded-xl shadow-lg overflow-hidden">

    <div class="px-4 pt-3 pb-2 flex items-start justify-between gap-2">
      <div class="min-w-0">
        <div class="text-base font-bold truncate" data-role="title">Máquina</div>
        <div class="text-xs text-gray-400 truncate mt-0.5" data-role="subtitle">Operador: - · Ciclo: - · Peça: -</div>
        <span data-role="statusBadge" class="status-badge status-badge-producao mt-1 inline-block">🟢 Produção</span>
      </div>
      <div class="text-right shrink-0">
        <div class="text-xs text-gray-400 uppercase tracking-wide">Previsto</div>
        <div class="text-3xl font-black leading-none" data-role="predicted">0</div>
      </div>
    </div>

    <div class="px-4 pb-2 flex flex-wrap items-center gap-2">
      <button data-role="btnSetup"      class="status-time-chip chip-setup">🟡 Setup: <span data-role="timeSetup">0:00</span></button>
      <button data-role="btnManutencao" class="status-time-chip chip-manutencao">🔴 Manut: <span data-role="timeManutencao">0:00</span></button>
      <div class="flex gap-2 ml-auto">
        <button data-role="btnPausar" class="btn-ctrl bg-gray-600 border-gray-500">⏸ Pausar</button>
        <button data-role="btnZerar"  class="btn-ctrl bg-orange-700 border-orange-500">↺ Zerar</button>
      </div>
    </div>

    <div class="border-t border-gray-700 mx-4"></div>

    <div class="px-4 py-3 grid grid-cols-2 gap-2">

      <div class="col-span-2">
        <label class="field-label">Operador</label>
        <input data-role="operator" placeholder="Nome do operador" class="field-input" />
      </div>

      <div class="col-span-2">
        <label class="field-label">Processo / Peça</label>
        <input data-role="process" placeholder="Ex: Flange 300" class="field-input" />
      </div>

      <div>
        <label class="field-label">Tempo de ciclo</label>
        <input data-role="cycle" placeholder="mm:ss" class="field-input" />
      </div>
      <div>
        <label class="field-label">Tempo de troca</label>
        <input data-role="troca" placeholder="mm:ss" class="field-input" />
      </div>

      <div>
        <label class="field-label">Início</label>
        <input data-role="startTime" type="time" class="field-input" />
      </div>
      <div>
        <label class="field-label">Fim</label>
        <input data-role="endTime" type="time" class="field-input" />
      </div>

      <div>
        <label class="field-label"> Parada auto</label>
        <div class="field-input flex items-center gap-1 bg-gray-700/50 border border-dashed border-gray-600">
          <span data-role="paradaAutoDisplay" class="font-mono font-bold text-yellow-300">0:00</span>
          <span class="text-gray-500 text-xs">(Setup+Manut)</span>
        </div>
      </div>
      <div>
        <label class="field-label">Peças realizadas</label>
        <input data-role="produced" placeholder="0" type="number" min="0" class="field-input" />
      </div>

      <div class="col-span-2">
        <label class="field-label">Observação</label>
        <input data-role="observacao" placeholder="Ex: quebra de ferramenta" class="field-input" />
      </div>

      <div class="col-span-2 flex gap-2 flex-wrap pt-1">
        <button data-role="save"         class="btn-action bg-green-600  flex-1">Salvar</button>
        <button data-role="addHistory"   class="btn-action bg-sky-600    flex-1"> Histórico</button>
        <button data-role="clearHistory" class="btn-action bg-red-700    flex-1"> Limpar</button>
      </div>
    </div>

    <div class="px-4 pb-2">
      <canvas data-role="chart" height="100"></canvas>
      <div data-role="performance" class="text-center text-sm font-semibold mt-1"></div>
    </div>

    <div class="mx-4 mb-3 max-h-36 overflow-y-auto bg-gray-900/40 rounded-lg p-2 text-xs" data-role="history"></div>

    <div class="px-4 pb-4 border-t border-gray-700 pt-3">
      <h3 class="text-xs font-bold uppercase tracking-wide text-gray-400 mb-2">Próximos processos</h3>
      <div class="flex gap-2 mb-2">
        <input data-role="futureInput" placeholder="Nome do processo" class="field-input flex-1" />
        <select data-role="prioritySelect" class="field-input w-auto px-2">
          <option value="vermelho">🔴 Urgente</option>
          <option value="amarelo">🟡 Alta</option>
          <option value="verde">🟢 Normal</option>
        </select>
      </div>
      <div class="flex gap-2 mb-2">
        <button data-role="addFuture"  class="btn-action bg-blue-600 flex-1">＋ Adicionar</button>
        <button data-role="sortFuture" class="btn-action bg-gray-600 flex-1">↕ Ordenar</button>
      </div>
      <div data-role="futureList" class="space-y-1"></div>
    </div>

  </div>
</template>

<script src="script.js"></script>
</body>
</html>
