<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard - Usinagem Dia</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <!-- Sortable -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

  <!-- CSS externo -->
  <link rel="stylesheet" href="style.css" />

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }
    });
  </script>
</head>

<body class="bg-gray-900 text-gray-100">
<header class="p-4 border-b border-gray-800">
  <h1 class="text-xl font-bold">Diário de produção — Usinagem Dia</h1>
  <div class="mt-2 flex gap-2">
    <button id="exportAll" class="px-3 py-1 bg-sky-600 rounded">Exportar tudo (CSV)</button>
    <button id="resetAll" class="px-3 py-1 bg-red-600 rounded">Resetar tudo</button>
  </div>
</header>

<main class="p-4 grid gap-4 grid-cols-1 lg:grid-cols-3">
  <section class="lg:col-span-3">
    <div id="machinesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </section>
</main>

<footer class="p-4 text-xs text-gray-500 border-t border-gray-800">
  Dashboard criado para acompanhamento diário de produção.
</footer>

<!-- Template -->
<template id="machine-template">
  <div class="p-4 bg-gray-800 rounded shadow card-status-producao">

    <!-- Cabeçalho: título + badge de status + previsto -->
    <div class="flex justify-between items-start gap-2 mb-2">
      <div>
        <div class="text-lg font-semibold" data-role="title">Máquina</div>
        <div class="text-xs text-gray-400 mt-0.5" data-role="subtitle">Operador: - · Ciclo: - · Peça: -</div>
        <!-- Badge de status atual -->
        <div class="mt-1">
          <span data-role="statusBadge" class="status-badge status-badge-producao">🟢 Produção</span>
        </div>
      </div>
      <div class="text-right">
        <div class="text-sm text-gray-300">Previsto</div>
        <div class="text-2xl font-bold" data-role="predicted">0</div>
      </div>
    </div>

    <!-- Botões de status -->
    <div class="flex gap-2 mb-1">
      <button data-role="btnProducao"   class="btn-status btn-status-producao   active">🟢 Produção</button>
      <button data-role="btnSetup"      class="btn-status btn-status-setup">🟡 Setup</button>
      <button data-role="btnManutencao" class="btn-status btn-status-manutencao">🔴 Manutenção</button>
    </div>

    <!-- Chips de tempo acumulado por status -->
    <div class="status-times mb-3">
      <span class="status-time-chip chip-producao">🟢 Prod: <span data-role="timeProducao">0:00</span></span>
      <span class="status-time-chip chip-setup">🟡 Setup: <span data-role="timeSetup">0:00</span></span>
      <span class="status-time-chip chip-manutencao">🔴 Manut: <span data-role="timeManutencao">0:00</span></span>
    </div>

    <!-- Campos de dados -->
    <div class="mt-1 grid grid-cols-1 gap-2">
      <div class="flex flex-col gap-2">
        <input data-role="operator"   placeholder="Operador"                                    class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <input data-role="process"    placeholder="Processo / Peça"                              class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <input data-role="cycle"      placeholder="Tempo de ciclo (hh:mm:ss ou min decimal)"     class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <input data-role="troca"      placeholder="Tempo de troca (hh:mm:ss ou min decimal)"     class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <div class="px-2 py-1 rounded bg-gray-700/50 text-sm text-gray-400 flex items-center gap-2 border border-gray-600 border-dashed">
          <span>⏱ Parada (Setup + Manutenção):</span>
          <span data-role="paradaAutoDisplay" class="font-mono font-semibold text-yellow-300">0:00</span>
        </div>
        <input data-role="startTime"  type="time"                                                class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <input data-role="endTime"    type="time"                                                class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <input data-role="produced"   placeholder="Peças realizadas (inteiro)"                   class="px-2 py-1 rounded bg-gray-700 text-sm" />
        <input data-role="observacao" placeholder="Observação"                                   class="px-2 py-1 rounded bg-gray-700 text-sm" />
      </div>

      <div class="flex gap-2 flex-wrap">
        <button data-role="save"         class="px-2 py-1 bg-green-600 rounded text-sm">Salvar</button>
        <button data-role="addHistory"   class="px-2 py-1 bg-sky-600 rounded text-sm">Adicionar ao Histórico</button>
        <button data-role="clearHistory" class="px-2 py-1 bg-red-600 rounded text-sm">Limpar Histórico</button>
      </div>

      <canvas data-role="chart" height="120"></canvas>
      <div data-role="performance" class="text-center text-sm font-semibold mt-1"></div>
      <div class="max-h-40 overflow-auto bg-gray-900/30 p-2 rounded text-sm" data-role="history"></div>

      <!-- Lista de espera -->
      <div class="mt-4">
        <h3 class="font-semibold text-sm mb-1">🕒 Processos Futuros</h3>
        <div class="flex gap-2 mb-2">
          <input data-role="futureInput" placeholder="Novo processo futuro" class="flex-1 px-2 py-1 rounded bg-gray-700 text-sm" />
          <select data-role="prioritySelect" class="px-2 py-1 rounded bg-gray-700 text-sm">
            <option value="vermelho">🔴 Urgente</option>
            <option value="amarelo">🟡 Alta</option>
            <option value="verde">🟢 Normal</option>
          </select>
          <button data-role="addFuture"  class="px-2 py-1 bg-blue-600 rounded text-sm">Adicionar</button>
          <button data-role="sortFuture" class="px-2 py-1 bg-gray-600 rounded text-sm sort-btn">Ordenar</button>
        </div>
        <div data-role="futureList" class="space-y-1"></div>
      </div>
    </div>
  </div>
</template>

<!-- JS externo -->
<script src="script.js"></script>
</body>
</html>
